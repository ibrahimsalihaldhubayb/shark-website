<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Bundled Page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #faf9f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    #__bundler_loading { position: fixed; bottom: 20px; right: 20px; font: 13px/1.4 -apple-system, BlinkMacSystemFont, sans-serif; color: #666; background: #fff; padding: 8px 14px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.12); z-index: 10000; }
    #__bundler_thumbnail { position: fixed; inset: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #faf9f5; z-index: 9999; }
    #__bundler_thumbnail svg { width: 100%; height: 100%; object-fit: contain; }
    #__bundler_placeholder { color: #999; font-size: 14px; }
  </style>
  <noscript>
    <style>#__bundler_loading { display: none; }</style>
    <div style="position:fixed;bottom:12px;left:12px;font:13px/1.4 -apple-system,BlinkMacSystemFont,sans-serif;color:#999;background:rgba(255,255,255,0.9);padding:6px 12px;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,0.08);z-index:10000;">
      This page requires JavaScript to display.
    </div>
  </noscript>
<script>
(function(){
  var SU = "https://script.google.com/macros/s/AKfycbxBzst69WR3puIEqCBukDbOdRzNaldZyzHyBt-6V-nuvIvSrVRJNoRO71HGkN7JbDUw/exec";
  function send(sheet, rec) {
    fetch(SU, {method:'POST', headers:{'Content-Type':'text/plain'}, body: JSON.stringify({sheet:sheet, record:rec})}).catch(function(){});
  }
  var _si = Storage.prototype.setItem;
  Storage.prototype.setItem = function(k, v) {
    _si.apply(this, arguments);
    try {
      var a = JSON.parse(v);
      if (!Array.isArray(a) || !a.length) return;
      var r = a[a.length-1];
      if (k === 'shark_leads') { if ((r.kind||'')==='عرض عقار') send('طلب تسويق',r); send('قاعدة البيانات',r); }
      else if (k === 'shark_interests') { send('تسجيل الاهتمام',r); send('قاعدة البيانات',r); }
      else if (k === 'shark_requests') { send('الطلبات',r); send('قاعدة البيانات',r); }
    } catch(e){}
  };
  window.sharkOpen = function(id){ document.getElementById(id).style.display='flex'; };
  window.sharkClose = function(id){ document.getElementById(id).style.display='none'; };
  function saveLocal(key, rec) {
    try {
      var arr = JSON.parse(localStorage.getItem(key)||'[]');
      var date = new Date().toLocaleString('ar-SA',{timeZone:'Asia/Riyadh'});
      arr.push(Object.assign({}, rec, {date:date, id:'SK-'+(Date.now()%100000)}));
      localStorage.setItem(key, JSON.stringify(arr));
    } catch(e){}
  }
  window.sharkSubmitInv = function() {
    var n=document.getElementById('si-name').value.trim(), p=document.getElementById('si-phone').value.trim(),
        t=document.getElementById('si-type').value, nt=document.getElementById('si-note').value.trim();
    if(!n||!p){alert('الرجاء إدخال الاسم ورقم الجوال');return;}
    var rec={name:n,phone:p,interest:t,note:nt,kind:'رغبة استثمار'};
    send('رغبة استثمار',rec); send('قاعدة البيانات',rec);
    saveLocal('shark_interests', rec);
    window.sharkClose('sm-inv');
    ['si-name','si-phone','si-type','si-note'].forEach(function(id){document.getElementById(id).value='';});
    alert('تم إرسال طلبك بنجاح!');
  };
  window.sharkSubmitMkt = function() {
    var n=document.getElementById('sm-name').value.trim(), p=document.getElementById('sm-phone').value.trim(),
        t=document.getElementById('sm-kind').value, nt=document.getElementById('sm-note').value.trim();
    if(!n||!p){alert('الرجاء إدخال الاسم ورقم الجوال');return;}
    var rec={name:n,phone:p,kind:'عرض عقار',interest:t,note:nt};
    send('طلب تسويق',rec); send('قاعدة البيانات',rec);
    saveLocal('shark_leads', rec);
    window.sharkClose('sm-mkt');
    ['sm-name','sm-phone','sm-kind','sm-note'].forEach(function(id){document.getElementById(id).value='';});
    alert('تم إرسال طلبك بنجاح!');
  };
  function sharkGetData() {
    var hdr = ['الاسم','الجوال','النوع / الاهتمام','ملاحظات','التاريخ'];
    function parse(k){ try{ return JSON.parse(localStorage.getItem(k)||'[]'); }catch(e){ return []; } }
    function row(r){ return [r.name||'', r.phone||'', r.kind||r.interest||r.type||'', r.note||r.city||'', r.date||r.createdAt||'']; }
    var leads = parse('shark_leads'), ints = parse('shark_interests'), reqs = parse('shark_requests');
    return {
      hdr: hdr,
      'قاعدة البيانات': leads.concat(ints).concat(reqs).map(row),
      'تسجيل الاهتمام': ints.map(row),
      'الطلبات': reqs.map(row),
      'طلب تسويق': leads.filter(function(r){ return (r.kind||'')==='عرض عقار'; }).map(row),
      'عملاء اتصال': leads.filter(function(r){ return (r.kind||'')===''; }).map(row)
    };
  }
  window.sharkExportExcel = function() {
    var data = sharkGetData();
    if(!data['قاعدة البيانات'].length){ alert('لا توجد بيانات محفوظة بعد'); return; }
    if(window.XLSX){ doExport(data); return; }
    var s = document.createElement('script');
    s.src = 'https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js';
    s.onload = function(){ doExport(data); };
    s.onerror = function(){ fallbackCSV(data); };
    document.head.appendChild(s);
  };
  function doExport(data) {
    var wb = XLSX.utils.book_new();
    ['قاعدة البيانات','تسجيل الاهتمام','الطلبات','طلب تسويق','عملاء اتصال'].forEach(function(name){
      var ws = XLSX.utils.aoa_to_sheet([data.hdr].concat(data[name]));
      ws['!cols'] = [{wch:22},{wch:16},{wch:18},{wch:30},{wch:22}];
      XLSX.utils.book_append_sheet(wb, ws, name);
    });
    XLSX.writeFile(wb, 'shark-' + new Date().toISOString().slice(0,10) + '.xlsx');
  }
  function fallbackCSV(data) {
    var rows = [data.hdr].concat(data['قاعدة البيانات']);
    var csv = '﻿' + rows.map(function(r){ return r.map(function(c){ return '"'+String(c).replace(/"/g,'""')+'"'; }).join(','); }).join('\r\n');
    var a = document.createElement('a'); a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'shark-' + new Date().toISOString().slice(0,10) + '.csv'; a.click();
  }
  /* ── Image compression ── */
  function compressImage(file, maxPx, quality, cb) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var w = img.width, h = img.height;
        if (w > maxPx || h > maxPx) {
          if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
          else { w = Math.round(w * maxPx / h); h = maxPx; }
        }
        var c = document.createElement('canvas'); c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        cb(c.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }
  /* ── Floating upload panel — lives OUTSIDE React, survives re-renders ── */
  function buildUploadPanel() {
    if (document.getElementById('sp-panel')) return;
    var coverPick = document.createElement('input');
    coverPick.type = 'file'; coverPick.accept = 'image/*'; coverPick.id = 'sp-cpick'; coverPick.style.display = 'none';
    var gallPick = document.createElement('input');
    gallPick.type = 'file'; gallPick.accept = 'image/*'; gallPick.multiple = true; gallPick.id = 'sp-gpick'; gallPick.style.display = 'none';

    var panel = document.createElement('div');
    panel.id = 'sp-panel';
    panel.style.cssText = 'display:none;position:fixed;left:16px;top:50%;transform:translateY(-50%);z-index:200000;flex-direction:column;gap:10px;align-items:stretch;width:160px';

    function mkBtn(txt, bg, pickId) {
      var b = document.createElement('button');
      b.type = 'button'; b.textContent = txt; b.dataset.pickId = pickId;
      b.style.cssText = 'background:' + bg + ';color:#fff;border:none;border-radius:10px;padding:12px 10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 14px rgba(0,0,0,.4);text-align:center;line-height:1.3';
      b.onclick = function(){ document.getElementById(this.dataset.pickId).click(); };
      return b;
    }

    var coverBtn = mkBtn('📷\nصورة الغلاف', '#c8a96e', 'sp-cpick');
    var gallBtn  = mkBtn('🖼️\nصور المعرض', '#2d6a4f', 'sp-gpick');

    coverPick.onchange = function() {
      if (!this.files[0]) return;
      coverBtn.textContent = '⏳ ضغط...';
      var f = this.files[0];
      compressImage(f, 1400, 0.78, function(b64) {
        var inp = document.querySelector('input[name="coverImg"]');
        if (inp) {
          Object.getOwnPropertyDescriptor(HTMLInputElement.prototype,'value').set.call(inp, b64);
          inp.dispatchEvent(new Event('input',{bubbles:true}));
          inp.dispatchEvent(new Event('change',{bubbles:true}));
        }
        coverBtn.textContent = '✅\nغلاف جاهز';
      });
    };
    gallPick.onchange = function() {
      var files = Array.from(this.files); if (!files.length) return;
      gallBtn.textContent = '⏳ ضغط...';
      var results = [], done = 0;
      files.forEach(function(f, i) {
        compressImage(f, 1200, 0.75, function(b64) {
          results[i] = b64; done++;
          if (done !== files.length) return;
          var ta = document.querySelector('textarea[name="gallery"]');
          if (ta) {
            var ex = ta.value.trim();
            Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype,'value').set.call(ta, (ex?ex+'\n':'')+results.filter(Boolean).join('\n'));
            ta.dispatchEvent(new Event('input',{bubbles:true}));
            ta.dispatchEvent(new Event('change',{bubbles:true}));
          }
          gallBtn.textContent = '✅\n' + files.length + ' صور';
        });
      });
    };

    panel.appendChild(coverPick);
    panel.appendChild(gallPick);
    panel.appendChild(coverBtn);
    panel.appendChild(gallBtn);
    document.body.appendChild(panel);
  }

  /* ── Custom features "+" entry — injected into React form ── */
  function injectCustomFeature() {
    var firstFeat = document.querySelector('input[name="features"]');
    if (!firstFeat || firstFeat.closest('[data-feat-ready]')) return;
    var featContainer = firstFeat.parentNode;
    while (featContainer && featContainer.childElementCount < 3) featContainer = featContainer.parentNode;
    if (!featContainer) return;
    featContainer.setAttribute('data-feat-ready', '1');
    var addRow = document.createElement('div');
    addRow.style.cssText = 'display:flex;gap:8px;margin-top:12px;align-items:center;grid-column:1/-1';
    var addInp = document.createElement('input');
    addInp.type = 'text'; addInp.placeholder = 'أدخل ميزة مخصصة...';
    addInp.style.cssText = 'flex:1;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;direction:rtl';
    var addBtn = document.createElement('button');
    addBtn.type = 'button'; addBtn.textContent = '+ إضافة';
    addBtn.style.cssText = 'background:#c8a96e;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap';
    addBtn.onclick = function() {
      var val = addInp.value.trim(); if (!val) return;
      var lbl = document.createElement('label');
      lbl.style.cssText = 'display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px;font-family:inherit';
      var cb = document.createElement('input');
      cb.type = 'checkbox'; cb.name = 'features'; cb.value = val; cb.checked = true;
      lbl.appendChild(cb); lbl.appendChild(document.createTextNode(val));
      featContainer.insertBefore(lbl, addRow);
      addInp.value = '';
    };
    addInp.addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); addBtn.click(); } });
    addRow.appendChild(addInp); addRow.appendChild(addBtn);
    featContainer.appendChild(addRow);
  }

  /* ── Poll: show/hide upload panel + inject feature button ── */
  setInterval(function() {
    buildUploadPanel();
    var panel = document.getElementById('sp-panel');
    var editorOpen = !!document.querySelector('input[name="coverImg"]');
    if (panel) panel.style.display = editorOpen ? 'flex' : 'none';
    if (editorOpen) {
      // Reset button labels when a fresh editor opens
      var cp = document.getElementById('sp-cpick');
      if (cp && cp.value) { /* keep status */ }
    }
    injectCustomFeature();
  }, 300);
  /* ── FABs + modals ── */
  function injectWidgets() {
    if (document.getElementById('shark-fab-wrap')) return;
    var css = document.createElement('style');
    css.textContent = '#shark-fab-wrap{position:fixed;bottom:22px;left:0;right:0;display:flex;justify-content:space-between;padding:0 18px;z-index:99999;pointer-events:none}#shark-fab-wrap button{pointer-events:all;background:#c8a96e;color:#fff;border:none;border-radius:50px;padding:13px 18px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 18px rgba(0,0,0,.28);font-family:inherit;white-space:nowrap}#shark-fab-wrap button:hover{background:#b8954f}.sk-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100000;align-items:center;justify-content:center}.sk-modal{background:#fff;border-radius:16px;padding:28px 24px;width:92%;max-width:400px;direction:rtl;position:relative;max-height:90vh;overflow-y:auto}.sk-modal h3{margin:0 0 18px;color:#c8a96e;font-size:18px;font-weight:700}.sk-modal input,.sk-modal select,.sk-modal textarea{width:100%;padding:10px 13px;margin-bottom:12px;border:1px solid #ddd;border-radius:8px;font-size:15px;box-sizing:border-box;font-family:inherit;direction:rtl}.sk-modal .sk-submit{width:100%;padding:13px;background:#c8a96e;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer}.sk-modal .sk-close{position:absolute;top:10px;left:14px;background:none;border:none;font-size:24px;cursor:pointer;color:#aaa;line-height:1}';
    document.head.appendChild(css);
    var wrap = document.createElement('div');
    wrap.id = 'shark-fab-wrap';
    wrap.innerHTML = '<button onclick="sharkOpen(\'sm-inv\')">💰 مهتم بالاستثمار</button><button onclick="sharkExportExcel()" style="background:#2d6a4f;font-size:12px;padding:10px 12px">📥 Excel</button><button onclick="sharkOpen(\'sm-mkt\')">🏠 أسوّق عقاري</button>';
    document.body.appendChild(wrap);
    var invM = document.createElement('div');
    invM.className = 'sk-overlay'; invM.id = 'sm-inv'; invM.style.display = 'none';
    invM.innerHTML = '<div class="sk-modal"><button class="sk-close" onclick="sharkClose(\'sm-inv\')">&#215;</button><h3>تسجيل اهتمام استثماري</h3><input id="si-name" type="text" placeholder="الاسم الكريم"><input id="si-phone" type="tel" placeholder="رقم الجوال"><select id="si-type"><option value="">نوع الاستثمار</option><option>أراضي</option><option>فلل</option><option>شقق</option><option>تجاري</option><option>مستودعات</option></select><textarea id="si-note" rows="3" placeholder="ملاحظات إضافية"></textarea><button class="sk-submit" onclick="sharkSubmitInv()">إرسال الطلب</button></div>';
    document.body.appendChild(invM);
    var mktM = document.createElement('div');
    mktM.className = 'sk-overlay'; mktM.id = 'sm-mkt'; mktM.style.display = 'none';
    mktM.innerHTML = '<div class="sk-modal"><button class="sk-close" onclick="sharkClose(\'sm-mkt\')">&#215;</button><h3>تسويق عقاري</h3><input id="sm-name" type="text" placeholder="الاسم الكريم"><input id="sm-phone" type="tel" placeholder="رقم الجوال"><select id="sm-kind"><option value="">نوع العقار</option><option>أرض</option><option>فيلا</option><option>شقة</option><option>عمارة</option><option>تجاري</option><option>مستودع</option></select><textarea id="sm-note" rows="3" placeholder="وصف العقار والموقع والسعر"></textarea><button class="sk-submit" onclick="sharkSubmitMkt()">إرسال الطلب</button></div>';
    document.body.appendChild(mktM);
    [invM, mktM].forEach(function(m){ m.addEventListener('click', function(e){ if(e.target===m) m.style.display='none'; }); });
  }
  var _rw = Element.prototype.replaceWith;
  Element.prototype.replaceWith = function() {
    _rw.apply(this, arguments);
    setTimeout(injectWidgets, 500);
    setTimeout(injectWidgets, 1200);
  };
  document.addEventListener('DOMContentLoaded', function(){
    setTimeout(injectWidgets, 700);
    setTimeout(injectWidgets, 2000);
  });
})();
</script>
</head>
<body>
  <div id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#0b0b0c"></rect><text x="50" y="58" font-family="Jost,sans-serif" font-size="34" font-weight="700" fill="#f4f3ef" text-anchor="middle">SHARK</text></svg></div>
  <div id="__bundler_loading">Unpacking...</div>

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
